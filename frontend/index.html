<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>70% Accuracy Auto Trading System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin: 10px 0;
        }
        .signal-buy {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .signal-sell {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .signal-wait {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .login-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-section button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-section button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Dashboard -->
        <div class="dashboard" id="dashboard">
            <h1 class="text-center mb-4">🚀 70% Accuracy Auto Trading System</h1>
            
            <div class="row" id="metrics">
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6>PCR</h6>
                        <h2 id="pcr">Loading...</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6>Max Pain</h6>
                        <h2 id="maxPain">Loading...</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6>Current Price</h6>
                        <h2 id="currentPrice">Loading...</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6>Heavy Call OI</h6>
                        <h2 id="heavyCall">Loading...</h2>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-12">
                    <div class="metric-card signal-wait pulse" id="signalCard">
                        <h3>📊 Signal: <span id="signal">WAIT</span></h3>
                        <div id="signalDetails"></div>
                        <button class="btn btn-light mt-3" id="executeBtn" onclick="executeTrade()">
                            Execute Trade Automatically
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <p class="text-muted text-center">
                    Last Updated: <span id="lastUpdate">Never</span> | 
                    Auto-refresh every 60 seconds
                </p>
            </div>
        </div>
    </div>

    <script>
        // Auto-start on page load
        window.addEventListener('DOMContentLoaded', async function() {
            // Start trading automatically
            try {
                await fetch('/api/start-trading', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({symbol: 'NIFTY'})
                });
                
                updateData();
                setInterval(updateData, 60000);
            } catch (error) {
                console.error('Auto-start error:', error);
            }
        });

        async function updateData() {
            try {
                const response = await fetch('/api/market-data');
                const data = await response.json();
                
                document.getElementById('pcr').textContent = data.pcr || 'N/A';
                document.getElementById('maxPain').textContent = data.max_pain || 'N/A';
                document.getElementById('currentPrice').textContent = data.current_price || 'N/A';
                document.getElementById('heavyCall').textContent = data.heavy_call || 'N/A';
                
                const signal = data.signal || {action: 'WAIT'};
                const signalCard = document.getElementById('signalCard');
                const signalEl = document.getElementById('signal');
                
                signalEl.textContent = signal.action;
                
                // Candle prediction display
                let candleInfo = '';
                if (signal.candle_prediction) {
                    const cp = signal.candle_prediction;
                    const emoji = cp.direction === 'BULLISH' ? '📈' : cp.direction === 'BEARISH' ? '📉' : '➡️';
                    const color = cp.direction === 'BULLISH' ? '#38ef7d' : cp.direction === 'BEARISH' ? '#f45c43' : '#ffd700';
                    
                    // Pattern emoji mapping
                    const patternEmojis = {
                        'Hammer': '🔨',
                        'Shooting Star': '⭐',
                        'Doji': '✖️',
                        'Bullish Engulfing': '🟢',
                        'Bearish Engulfing': '🔴',
                        'Bullish Marubozu': '💚',
                        'Bearish Marubozu': '❤️',
                        'Spinning Top': '🌀',
                        'Inverted Hammer': '🔨',
                        'Hanging Man': '🎣'
                    };
                    
                    const patternEmoji = patternEmojis[cp.pattern] || '📊';
                    
                    candleInfo = `
                        <div style="background: rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; margin-top: 10px;">
                            <p><strong>🕯️ Next 15-Min Candle Prediction:</strong></p>
                            <p style="font-size: 24px; margin: 5px 0;">${emoji} <span style="color: ${color}">${cp.direction}</span></p>
                            <p><strong>Confidence:</strong> ${cp.confidence}%</p>
                            ${cp.pattern ? `<p style="font-size: 16px; margin-top: 8px;">${patternEmoji} <strong>Pattern:</strong> ${cp.pattern}</p>` : ''}
                            <p style="font-size: 12px; opacity: 0.8; margin-top: 5px;">${cp.reason || ''}</p>
                        </div>
                    `;
                }
                
                if (signal.action === 'BUY') {
                    signalCard.className = 'metric-card signal-buy pulse';
                    document.getElementById('signalDetails').innerHTML = `
                        <p><strong>Type:</strong> ${signal.type}</p>
                        <p><strong>Entry:</strong> ${signal.entry}</p>
                        <p><strong>Target:</strong> ${signal.target}</p>
                        <p><strong>SL:</strong> ${signal.sl}</p>
                        <p><strong>Confidence:</strong> ${signal.confidence}%</p>
                        ${signal.reason ? '<p style="font-size: 14px; opacity: 0.9;">📝 ' + signal.reason + '</p>' : ''}
                        ${candleInfo}
                    `;
                } else if (signal.action === 'SELL') {
                    signalCard.className = 'metric-card signal-sell pulse';
                    document.getElementById('signalDetails').innerHTML = `
                        <p><strong>Type:</strong> ${signal.type}</p>
                        <p><strong>Entry:</strong> ${signal.entry}</p>
                        <p><strong>Target:</strong> ${signal.target}</p>
                        <p><strong>SL:</strong> ${signal.sl}</p>
                        <p><strong>Confidence:</strong> ${signal.confidence}%</p>
                        ${signal.reason ? '<p style="font-size: 14px; opacity: 0.9;">📝 ' + signal.reason + '</p>' : ''}
                        ${candleInfo}
                    `;
                } else {
                    signalCard.className = 'metric-card signal-wait';
                    document.getElementById('signalDetails').innerHTML = `
                        <p>${signal.reason || 'No trade setup yet. Waiting for opportunity...'}</p>
                        ${candleInfo}
                    `;
                }
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function executeTrade() {
            if (confirm('Are you sure you want to execute this trade automatically?')) {
                try {
                    const response = await fetch('/api/execute-trade', {method: 'POST'});
                    const result = await response.json();
                    alert('Trade executed! Order ID: ' + (result.order?.orderid || 'Check console'));
                } catch (error) {
                    alert('Trade execution failed: ' + error);
                }
            }
        }
    </script>
</body>
</html>
